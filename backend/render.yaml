services:
  - type: web
    name: loveletters-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: loveletters
      - key: CORS_ORIGINS
        value: "*"
